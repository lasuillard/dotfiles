name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: bats

      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()

  unittest:
    name: Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Run unit tests
        run: |
          ./test/bats/bin/bats --verbose-run --recursive ./test/unit

  integration-test-linux:
    strategy:
      matrix:
        platform:
          - ubuntu-latest
          # TODO: ubuntu-latest-arm is not available yet
          # https://github.com/orgs/community/discussions/148648#discussioncomment-11858287
          - ubuntu-24.04-arm
        image:
          - mcr.microsoft.com/devcontainers/base:ubuntu24.04
          - mcr.microsoft.com/devcontainers/base:debian12
          - mcr.microsoft.com/devcontainers/base:debian13

    name: Integration Test (${{ matrix.platform }}, ${{ matrix.image }})
    if: contains(vars.CI_PLATFORMS_TO_TEST, 'linux')
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Run integration tests
        env:
          LINUX_TEST__BASE_IMAGE: ${{ matrix.image }}
        run: |
          ./test/bats/bin/bats --verbose-run --recursive ./test/integration/linux

  integration-test-macos:
    strategy:
      matrix:
        platform:
          - macos-latest

    name: Integration Test (${{ matrix.platform }})
    if: contains(vars.CI_PLATFORMS_TO_TEST, 'macos')
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Run integration tests
        run: |
          ./test/bats/bin/bats --verbose-run --recursive ./test/integration/macos

  integration-test-windows:
    strategy:
      matrix:
        platform:
          - windows-latest
          - windows-11-arm # TODO: windows-latest-arm is not available yet

    name: Integration Test (${{ matrix.platform }})
    if: contains(vars.CI_PLATFORMS_TO_TEST, 'windows')
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Run integration tests
        shell: bash
        run: |
          ./test/bats/bin/bats --verbose-run --recursive ./test/integration/windows
